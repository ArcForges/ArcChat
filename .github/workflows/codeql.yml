name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 1 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
          queries: security-and-quality
          config: |
            paths:
              - apps/desktop
            paths-ignore:
              - '**/bin/**'
              - '**/obj/**'

      - name: Restore
        run: dotnet restore ArcChat.slnx

      - name: Build
        run: dotnet build ArcChat.slnx --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
