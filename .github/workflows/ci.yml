name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, ubuntu-24.04]
    env:
      MSBUILDDISABLENODEREUSE: "1"
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore ArcChat.slnx
      - name: Format
        run: dotnet format ArcChat.slnx --verify-no-changes --no-restore --verbosity minimal
      - name: Build
        run: dotnet build ArcChat.slnx -warnaserror --no-restore
      - name: Test
        run: dotnet test ArcChat.slnx --no-build --logger trx --collect:"XPlat Code Coverage"
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: "**/TestResults/**/*"
